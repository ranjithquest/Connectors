name: Deploy to GitHub Pages

on:
  push:
    branches:
      - Boilerplate
      - 'concept/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deploy path
        id: path
        run: |
          if [ "${{ github.ref_name }}" = "Boilerplate" ]; then
            echo "subfolder=." >> $GITHUB_OUTPUT
            echo "basepath=" >> $GITHUB_OUTPUT
          else
            SLUG=$(echo "${{ github.ref_name }}" | sed 's|concept/||' | sed 's|/|-|g')
            echo "subfolder=concept-${SLUG}" >> $GITHUB_OUTPUT
            echo "basepath=/Connectors/concept-${SLUG}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.path.outputs.basepath }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: ${{ steps.path.outputs.subfolder }}
          keep_files: true
